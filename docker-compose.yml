# Orchestrates the full local development stack:
# - MongoDB 7 (database)
# - NER Sanitizer (Python FastAPI, HuggingFace RoBERTa model)
# - Backend (Python FastAPI + LangGraph + Beanie ODM)
#
# Usage:
#   docker compose up --build        # build images and start everything
#   docker compose logs -f backend   # tail backend logs
#   docker compose down              # stop; add -v to also wipe volumes
#
# Services:
#   - Backend API: http://localhost:3000 (Swagger at /docs)
#   - Sanitizer:  http://localhost:8000 (Swagger at /docs)
#   - MongoDB:    mongodb://localhost:27018 (use mongosh or Compass)
#
# Service-to-service networking: all services are on one network and reach
# each other by service name (e.g., backend→mongo:27017, backend→sanitise:8000).

services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"          # exposed to host so you can use Compass/mongosh locally
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  sanitise:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/cache/huggingface   # persist the downloaded NER model between runs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s  # allow time for model download

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    env_file:
      - .env                          # brings in OPENAI_API_KEY + model names
    environment:
      # Override the URLs from .env to use in-network service names instead of localhost.
      MONGODB_URI: mongodb://mongo:27017
      DB_NAME: analysisai
      SANITIZER_URL: http://sanitise:8000/ner
    depends_on:
      mongo:
        condition: service_healthy    # wait until Mongo accepts connections
      sanitise:
        condition: service_healthy    # wait until the NER model has loaded
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:      # MongoDB data persists across `docker compose down`
  hf_cache:        # HuggingFace model cache (avoids re-downloading roberta)
